    <script>
      (function () {
        var storageKey = "aucoThankYouState";
        var maxAge = 10 * 60 * 1000;

        try {
          var state = JSON.parse(sessionStorage.getItem(storageKey) || "null");
          var leadId = state && state.leadId;
          var submittedAt = state && Date.parse(String(state.submittedAt || ""));
          var isRecent = Number.isFinite(submittedAt) && Date.now() - submittedAt >= 0 && Date.now() - submittedAt <= maxAge;
          var isValidLead = /^AUCO-\d{8}-[A-F0-9]{6}$/.test(String(leadId || ""));
          var metaLeadKey = "metaLeadConversion:" + leadId;

          if (state && state.submissionConfirmed === true && isValidLead && isRecent && sessionStorage.getItem(metaLeadKey) !== "true" && typeof window.fbq === "function") {
            window.fbq("track", "Lead", {
              content_name: "leads-parque-auco",
              status: "submitted"
            }, {
              eventID: leadId
            });
            sessionStorage.setItem(metaLeadKey, "true");
          }
        } catch (error) {
          console.error("Meta lead conversion skipped.", error);
        }
      })();
    </script>
