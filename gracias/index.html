    <!-- Marketing tags: events queue immediately; third-party scripts load after interaction -->
    <script>
    (function(w,d){
      w.dataLayer=w.dataLayer||[];
      w.dataLayer.push({'gtm.start':new Date().getTime(),event:'gtm.js'});
      if(!w.fbq){var n=w.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!w._fbq)w._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];}
      fbq('set', 'autoConfig', false, '1004828548959223');
      fbq('init', '1004828548959223');
      fbq('track', 'PageView');
      w.AUCO_META_PIXEL_BASE_LOADED = true;

      var loaded=false;
      var fallbackTimer=0;
      function loadMarketingTags(){
        if(loaded)return;
        loaded=true;
        w.clearTimeout(fallbackTimer);
        var g=d.createElement('script');
        g.async=true;
        g.src='https://www.googletagmanager.com/gtm.js?id=GTM-TRBQQ4W8';
        d.head.appendChild(g);
        var m=d.createElement('script');
        m.async=true;
        m.src='https://connect.facebook.net/en_US/fbevents.js';
        d.head.appendChild(m);
      }
      w.AUCO_LOAD_MARKETING_TAGS=loadMarketingTags;
      if(w.location.pathname.indexOf('/gracias')!==-1){
        loadMarketingTags();
      }else{
        ['pointerdown','keydown','scroll'].forEach(function(eventName){
          w.addEventListener(eventName,loadMarketingTags,{once:true,passive:true});
        });
        w.addEventListener('load',function(){
          fallbackTimer=w.setTimeout(loadMarketingTags,4500);
        },{once:true});
      }
    })(window,document);
    </script>
    <!-- End marketing tags -->
    <script>
      (function () {
        var storageKey = "aucoThankYouState";
        var maxAge = 10 * 60 * 1000;

        try {
          var state = JSON.parse(sessionStorage.getItem(storageKey) || "null");
          var leadId = state && state.leadId;
          var submittedAt = state && Date.parse(String(state.submittedAt || ""));
          var isRecent = Number.isFinite(submittedAt) && Date.now() - submittedAt >= 0 && Date.now() - submittedAt <= maxAge;
          var isValidLead = /^AUCO-\d{8}-[A-F0-9]{6}$/.test(String(leadId || ""));
          var gtmLeadKey = "gtmLeadConversion:" + leadId;
          var metaLeadKey = "metaLeadConversion:" + leadId;

          if (state && state.submissionConfirmed === true && isValidLead && isRecent && sessionStorage.getItem(gtmLeadKey) !== "true") {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
              event: "lead_saved",
              lead_id: leadId,
              transaction_id: leadId,
              form_name: "leads-parque-auco",
              value: 1,
              currency: "CLP"
            });
            sessionStorage.setItem(gtmLeadKey, "true");
          }
          if (state && state.submissionConfirmed === true && isValidLead && isRecent && sessionStorage.getItem(metaLeadKey) !== "true" && typeof window.fbq === "function") {
            window.fbq("track", "Lead", {
              content_name: "leads-parque-auco",
              status: "submitted"
            }, {
              eventID: leadId
            });
            sessionStorage.setItem(metaLeadKey, "true");
          }
        } catch (error) {
          console.error("Meta lead conversion skipped.", error);
        }
      })();
    </script>
